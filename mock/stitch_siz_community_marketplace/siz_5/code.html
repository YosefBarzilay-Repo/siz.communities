<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
        }
    </style>

                        "surface-container-high": "#e7e8e9",

                        "on-secondary-fixed-variant": "#41484a",

                        "inverse-surface": "#2e3132",

                        "inverse-primary": "#3edae3",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    "spacing": {

                        "sm": "8px",
                        "gutter": "12px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "unit": "4px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "display-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],

                        "display-lg": ["Plus Jakarta Sans"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-between">
<!-- Top Branding Anchor -->
<header class="w-full h-16 flex items-center justify-center pt-8">
<span class="text-3xl font-black text-[#00C2CB] tracking-tight font-display-lg">SIZ</span>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-container-padding flex-1 flex flex-col justify-center">
<!-- Welcome Section -->
<section class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">ברוכים הבאים</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">היכנסו כדי להתחיל לקנות ולמכור בקהילה</p>
</section>
<!-- Login Form -->
<form class="space-y-lg">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-unit" for="email">אימייל</label>
<div class="relative">
<input class="w-full h-14 px-lg rounded-xl border border-outline bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none text-right font-body-lg" id="email" placeholder="your@email.com" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-unit">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">סיסמה</label>
<a class="font-label-sm text-label-sm text-primary" href="#">שכחת סיסמה?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-lg rounded-xl border border-outline bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none text-right font-body-lg" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-md space-y-md">
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-title-md text-title-md shadow-sm active:scale-[0.98] transition-all duration-200 flex items-center justify-center" type="submit">
                    התחברות
                </button>
<div class="flex items-center gap-sm py-xs">
<div class="flex-1 h-[1px] bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">או התחברו באמצעות</span>
<div class="flex-1 h-[1px] bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center h-12 rounded-xl border border-outline bg-white hover:bg-surface-container-low transition-colors" type="button">
<img alt="" class="w-5 h-5 ml-2" data-alt="clean vector icon of the colorful google G logo on a white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRvT2Fooptg3TS5eEmkysJih03Jfdkbw1VI0Q_vV6Kmyf_TuXlQ4tn7K-JGmiM9z18WXTsGflH8n5c_l2LGbI_1QsOmT9B9DDIN4AFS603_xYHn2xppDaR-5yVY-l4j-PXc026B_Uj0P6x-TuH_9wdGsDMwUVBvKlwSU9LZYuayfUYQNEE5taYgDuANhawfr8tqwesHifasyjXcgQZ_LC7VWt0JMrmuxu8MRbWcHc_cGqxPfWnaqVsYZDlcPpiAIXh8_MQTuaMdOI"/>
<span class="font-label-lg">Google</span>
</button>
<button class="flex items-center justify-center h-12 rounded-xl border border-outline bg-white hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined ml-2 text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-lg">Apple</span>
</button>
</div>
</div>
</form>
</main>
<!-- Footer Links -->
<footer class="w-full p-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
            עדיין אין לכם חשבון? 
            <a class="text-primary font-bold hover:underline" href="#">הרשמה</a>
</p>
</footer>
<!-- Decorative Element (Bento-style background hint) -->
<div class="fixed -bottom-20 -right-20 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-20 -left-20 w-48 h-48 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</body></html>
